
services:

  # ---------------------------------------------------------------------------
  # Keycloak — OAuth 2.1 Authorization Server (AS)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./tmp/keycloak/data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Auth Proxy — OAuth 2.1 Resource Server (RS)
  #   Validates Bearer tokens against Keycloak before forwarding to MCP Server.
  #   This is the ONLY entry point exposed to clients.
  # ---------------------------------------------------------------------------
  auth-proxy:
    build:
      context: ./infra/auth-proxy
      dockerfile: Dockerfile
    container_name: auth-proxy
    environment:
      PROXY_PORT: "3030"
      MCP_UPSTREAM_URL: "http://mongodb-mcp:${MDB_MCP_HTTP_PORT:-8008}"
      KEYCLOAK_ISSUER_URL: "http://keycloak:8080/realms/mcp"
      KEYCLOAK_PUBLIC_URL: "http://localhost:8080/realms/mcp"
      REQUIRED_AUDIENCE: "mcp-server"
      REQUIRED_SCOPE: "mcp:access"
    ports:
      - "3030:3030"
    depends_on:
      keycloak:
        condition: service_healthy
    restart: unless-stopped
  
  # ---------------------------------------------------------------------------
  # MongoDB MCP Server — statically configured, bound to localhost inside
  #   its own network namespace (only the proxy can reach it)
